<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kanban Board</title>
    <script>
      // Save the full URL, then redirect to the app's root.
      // index.html will read this and restore the correct URL.
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
